<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<style>* { margin:0; padding:0; box-sizing:border-box; } html,body { width:100%; height:100%; overflow:hidden; background:#000; }
#gl { position:fixed;top:0;left:0;width:100%;height:100%;z-index:0; }
#ui { position:fixed;top:0;left:0;width:100%;height:100%;z-index:1; }
</style>
</head><body>
<canvas id="gl"></canvas>
<canvas id="ui"></canvas>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script type="module">
window.addEventListener('error', e => { document.title += ' | ERR:' + e.message; });
window.addEventListener('unhandledrejection', e => { document.title += ' | REJ:' + e.reason; });

try {
    const { Game } = await import('./src/game.js');
    const { OnlineClient } = await import('./src/online.js');
    const { sound } = await import('./src/sound.js');

    const glCanvas = document.getElementById('gl');
    const uiCanvas = document.getElementById('ui');
    const game = new Game(glCanvas, uiCanvas);
    game.online = new OnlineClient(game);
    game.sound = sound;
    game.start();
    self.__game = game;

    document.title = 'Game started: ' + game.state + ' | 3D:' + game.renderer._3dReady;
} catch(e) {
    document.title = 'GAME ERROR: ' + e.message;
    console.error(e);
}
</script>
</body></html>
